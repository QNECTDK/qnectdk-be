        birthDate:
          type: string
          format: date
          description: 생년월일(전체 날짜)
          example: 2005-03-16
        age:
          type: integer
          format: int32
          description: 나이(생년월일로 계산)
          example: 23
        zodiac:
          type: string
          description: 띠(생년월일로 계산)
          example: 토끼
        school:
          type: string
          description: 학교명
          example: 국민대학교
        gender:
          type: string
          description: 성별
          enum:
          - MALE
          - FEMALE
