                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "본인 그룹이 아님 — NOT_GROUP_OWNER"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "404":
          description: "그룹을 찾을 수 없음(GROUP_NOT_FOUND) 또는 그룹에 없는 멤버(GROUP_MEMBER_NOT_FOUND)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
components:
  responses:
    Unauthorized:
      description: "401 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨."
      content:
        '*/*':
          schema:
            $ref: "#/components/schemas/ApiResponseVoid"
    ValidationError:
      description: "400 입력값 검증 실패 — INVALID_INPUT. Bean Validation 실패 시 error.fields 에 필드별 메시지. 바디 파싱 실패·파라미터 타입 불일치 포함."
      content:
        '*/*':
          schema:
            $ref: "#/components/schemas/ApiResponseVoid"
  schemas:
    OptionInput:
      type: object
      properties:
        content:
          type: string
          description: 보기 텍스트
          maxLength: 255
          minLength: 0
        correct:
          type: boolean
          description: 정답 보기 여부
      required:
      - content
    QuestionInput:
      type: object
      properties:
        type:
          type: string
          description: 문항 종류(MULTIPLE/OX)
          enum:
          - MULTIPLE
          - OX
        content:
          type: string
          description: 질문
          maxLength: 255
          minLength: 0
        correctAnswer:
          type: string
          description: "정답(OX=O/X, 객관식=정답 보기 텍스트)"
          maxLength: 255
          minLength: 0
        required:
          type: boolean
          description: 필수 출제 여부
        options:
          type: array
          description: 객관식 보기(OX는 생략/빈 목록)
          items:
            $ref: "#/components/schemas/OptionInput"
      required:
      - content
      - correctAnswer
      - type
    QuizSaveRequest:
      type: object
      properties:
        questions:
          type: array
          description: 문항 목록(3~5개)
          items:
            $ref: "#/components/schemas/QuestionInput"
          maxItems: 5
          minItems: 3
      required:
      - questions
    ApiResponseQuizResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: "#/components/schemas/QuizResponse"
          description: 성공 시 응답 데이터 (실패 시 null)
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: 실패 시 에러 정보 (성공 시 null)
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: "에러 코드. HTTP status 와 함께 분기 키로 사용한다."
          example: INVALID_INPUT
          enum:
          - INVALID_INPUT
          - METHOD_NOT_ALLOWED
          - UNAUTHORIZED
          - ACCESS_DENIED
          - RESOURCE_CONFLICT
          - INTERNAL_ERROR
          - INVALID_CREDENTIALS
          - INVALID_TOKEN
          - EXPIRED_TOKEN
          - DUPLICATE_LOGIN_ID
          - DUPLICATE_PHONE
          - USER_NOT_FOUND
          - PROFILE_NOT_FOUND
          - INTEREST_NOT_FOUND
          - QUIZ_NOT_FOUND
          - QUIZ_ATTEMPT_NOT_FOUND
          - QUIZ_FORBIDDEN
          - QUIZ_NOT_SOLVABLE
          - QUIZ_INVALID_CONTENT
          - QUIZ_GENERATION_FAILED
          - DAILY_QUIZ_NOT_FOUND
          - DAILY_ALREADY_ANSWERED
          - DAILY_NOT_ANSWERED_YET
          - FRIENDSHIP_NOT_FOUND
          - ALREADY_FRIENDS
          - FRIENDSHIP_NOT_PENDING
          - NOT_FRIENDSHIP_ADDRESSEE
          - MEMO_NOT_FOUND
          - GROUP_NOT_FOUND
          - NOT_GROUP_OWNER
          - DUPLICATE_GROUP_NAME
          - NOT_ACCEPTED_FRIEND
          - ALREADY_GROUP_MEMBER
          - GROUP_MEMBER_NOT_FOUND
          - INSUFFICIENT_POINT
        message:
          type: string
          description: 사람이 읽을 수 있는 에러 메시지(그대로 노출 가능)
          example: 입력값이 올바르지 않습니다.
        fields:
          type: object
          additionalProperties:
            type: string
          description: "Bean Validation 실패 시 필드별 메시지 맵 (그 외 에러는 null)"
          example:
            mbti: MBTI는 4자리 영문이어야 합니다.
    OptionView:
      type: object
      properties:
        optionId:
          type: integer
          format: int64
          description: 보기 ID
        content:
          type: string
          description: 보기 텍스트
        correct:
          type: boolean
          description: 정답 보기 여부
        seq:
          type: integer
          format: int32
          description: 보기 순서
    QuestionView:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
          description: 문항 ID
        type:
          type: string
          description: 문항 종류
          enum:
          - MULTIPLE
          - OX
        content:
          type: string
          description: 질문
        correctAnswer:
          type: string
          description: "정답(OX=O/X, 객관식=정답 보기 텍스트)"
        required:
          type: boolean
          description: 필수 출제 여부
        seq:
          type: integer
          format: int32
          description: 문항 순서
        options:
          type: array
          description: 객관식 보기(OX는 빈 목록)
          items:
            $ref: "#/components/schemas/OptionView"
    QuizResponse:
      type: object
      properties:
        quizId:
          type: integer
          format: int64
          description: 퀴즈 ID
        type:
          type: string
          description: 퀴즈 종류
          enum:
          - FIRST_MEET
          - REMIND
        active:
          type: boolean
          description: 활성 여부
        questions:
          type: array
          description: 문항 목록(정답 포함)
          items:
            $ref: "#/components/schemas/QuestionView"
    ProfileRequest:
      type: object
      properties:
        school:
          type: string
          description: 학교명
          example: 국민대학교
          maxLength: 30
          minLength: 0
        gender:
          type: string
          description: 성별
          enum:
          - MALE
          - FEMALE
          example: MALE
        mbti:
          type: string
          description: MBTI(영문 4자)
          example: ENFP
          minLength: 1
          pattern: "^[A-Za-z]{4}$"
        drinkLevel:
          type: string
          description: 주량
          example: 소주 3잔
          maxLength: 20
          minLength: 0
        favoriteFood:
          type: string
          description: 좋아하는 음식
          example: 치킨
          maxLength: 30
          minLength: 0
      required:
      - drinkLevel
      - gender
      - mbti
      - school
    ApiResponseProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: "#/components/schemas/ProfileResponse"
          description: 성공 시 응답 데이터 (실패 시 null)
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: 실패 시 에러 정보 (성공 시 null)
    ProfileResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: 사용자 ID
        name:
          type: string
          description: 이름
        birthDate:
          type: string
          format: date
          description: "생년월일(전체 날짜)"
          example: 2005-03-16
        age:
          type: integer
          format: int32
          description: 나이(생년월일로 계산)
        zodiac:
          type: string
          description: 띠(생년월일로 계산)
        school:
          type: string
          description: 학교명
        gender:
          type: string
          description: 성별
          enum:
          - MALE
          - FEMALE
        mbti:
          type: string
          description: MBTI
        drinkLevel:
          type: string
          description: 주량
        favoriteFood:
          type: string
          description: 좋아하는 음식
        imageUrl:
          type: string
          description: "사용자 업로드 사진 URL(현재 업로드 기능 미사용 → 항상 null). 있으면 캐릭터보다 우선 표시"
        characterId:
          type: string
          description: "캐릭터 식별자(미설정 시 띠 기본 캐릭터). 프론트가 이미지 매핑"
          example: character07
        publicCode:
          type: string
          description: QR/공유용 고유 코드
        profileCompleted:
          type: boolean
          description: 온보딩 완료 여부(프로필 작성됨)
    InterestUpdateRequest:
      type: object
      properties:
        interestIds:
          type: array
          description: 설정할 관심사 ID 목록 (빈 배열은 전체 해제)
          example:
          - 1
          - 2
          - 11
          items:
            type: integer
            format: int64
      required:
      - interestIds
    ApiResponseListInterestResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          type: array
          description: 성공 시 응답 데이터 (실패 시 null)
          items:
            $ref: "#/components/schemas/InterestResponse"
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: 실패 시 에러 정보 (성공 시 null)
    InterestResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 관심사 ID
        category:
          type: string
          description: 관심사 카테고리명
        name:
          type: string
          description: 관심사 이름
    GroupUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 30
          minLength: 0
        hashtags:
          type: string
          maxLength: 100
          minLength: 0
      required:
      - name
    ApiResponseGroupResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: "#/components/schemas/GroupResponse"
