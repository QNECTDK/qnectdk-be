        data:
          $ref: "#/components/schemas/UserItemResponse"
          description: 성공 시 응답 데이터 (실패 시 null)
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: 실패 시 에러 정보 (성공 시 null)
    UserItemResponse:
      type: object
      properties:
        userItemId:
          type: integer
          format: int64
          description: 보유 아이템 id
          example: 1
        itemId:
          type: integer
          format: int64
          description: 원본 상점 아이템 id
