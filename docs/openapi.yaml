      description: 그룹 멤버 추가 시 사용. 친구의 id+이름만 반환.
      operationId: getFriendSummaries
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListFriendSummary"
  /api/friends/requests/received:
    get:
      tags:
      - 친구
      summary: 받은 친구 요청 목록
      description: 내가 받은 대기중(PENDING) 친구 요청들을 반환한다.
      operationId: getReceivedRequests
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListFriendResponse"
  /api/friends/memos/{friendId}:
    get:
      tags:
      - 친구
      summary: 친구 메모 조회
      description: 특정 친구에 대한 내 비공개 메모를 조회한다.
      operationId: getMemo
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFriendMemoResponse"
  /api/daily/today:
    get:
      tags:
      - 데일리
      summary: 오늘의 데일리 조회
      description: 오늘의 밸런스 질문과 내 답변 상태를 반환한다. 통계는 답한 뒤 별도 조회.
      operationId: getToday
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDailyTodayResponse"
  /api/daily/today/stats:
    get:
      tags:
      - 데일리
      summary: 데일리 통계 조회
      description: 전체/친구 A·B 비율과 친구별 개별 선택을 반환한다. 내가 먼저 답해야 공개(미답변 시 403).
      operationId: stats
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDailyStatsResponse"
  /api/auth/check-login-id:
    get:
      tags:
      - 인증
      summary: 아이디 중복확인
      description: 주어진 로그인 아이디의 사용 가능 여부를 확인한다.
      operationId: checkLoginId
      parameters:
      - name: arg0
        in: query
        description: 중복 확인할 로그인 아이디
        required: true
        schema:
          type: string
        example: tester01
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCheckLoginIdResponse"
  /api/groups/{groupId}/members/{friendId}:
    delete:
      tags:
      - 그룹
