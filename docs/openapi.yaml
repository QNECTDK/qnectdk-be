        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: "#/components/schemas/ImageResponse"
          description: 성공 시 응답 데이터 (실패 시 null)
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: 실패 시 에러 정보 (성공 시 null)
    ImageResponse:
