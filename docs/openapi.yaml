      description: 그룹에서 특정 멤버를 제거한다.
      operationId: removeMember
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
components:
  schemas:
    OptionInput:
      type: object
      properties:
        content:
          type: string
          description: 보기 텍스트
          maxLength: 255
          minLength: 0
        correct:
          type: boolean
          description: 정답 보기 여부
      required:
      - content
    QuestionInput:
      type: object
      properties:
        type:
          type: string
          description: 문항 종류(MULTIPLE/OX)
          enum:
          - MULTIPLE
          - OX
        content:
          type: string
          description: 질문
          maxLength: 255
          minLength: 0
        correctAnswer:
          type: string
          description: "정답(OX=O/X, 객관식=정답 보기 텍스트)"
          maxLength: 255
          minLength: 0
        required:
          type: boolean
          description: 필수 출제 여부
        options:
          type: array
          description: 객관식 보기(OX는 생략/빈 목록)
          items:
            $ref: "#/components/schemas/OptionInput"
      required:
      - content
      - correctAnswer
      - type
    QuizSaveRequest:
      type: object
      properties:
        questions:
          type: array
          description: 문항 목록(3~5개)
          items:
            $ref: "#/components/schemas/QuestionInput"
          maxItems: 5
          minItems: 3
      required:
      - questions
    ApiResponseQuizResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: "#/components/schemas/QuizResponse"
          description: 성공 시 응답 데이터 (실패 시 null)
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: 실패 시 에러 정보 (성공 시 null)
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: "에러 코드(예: INVALID_INPUT)"
          example: INVALID_INPUT
        message:
          type: string
          description: 에러 메시지
          example: 입력값이 올바르지 않습니다.
        fields:
          type: object
          additionalProperties:
            type: string
          description: 검증 실패 시 필드별 메시지 (해당 없으면 null)
    OptionView:
      type: object
      properties:
        optionId:
          type: integer
          format: int64
          description: 보기 ID
        content:
          type: string
          description: 보기 텍스트
        correct:
          type: boolean
          description: 정답 보기 여부
        seq:
          type: integer
          format: int32
          description: 보기 순서
    QuestionView:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
          description: 문항 ID
        type:
          type: string
          description: 문항 종류
          enum:
          - MULTIPLE
          - OX
        content:
          type: string
          description: 질문
        correctAnswer:
          type: string
          description: "정답(OX=O/X, 객관식=정답 보기 텍스트)"
        required:
          type: boolean
          description: 필수 출제 여부
        seq:
          type: integer
          format: int32
          description: 문항 순서
        options:
          type: array
          description: 객관식 보기(OX는 빈 목록)
          items:
            $ref: "#/components/schemas/OptionView"
    QuizResponse:
      type: object
      properties:
        quizId:
          type: integer
          format: int64
          description: 퀴즈 ID
        type:
          type: string
          description: 퀴즈 종류
          enum:
          - FIRST_MEET
          - REMIND
        active:
          type: boolean
          description: 활성 여부
        questions:
          type: array
          description: 문항 목록(정답 포함)
          items:
            $ref: "#/components/schemas/QuestionView"
    ProfileRequest:
      type: object
      properties:
        school:
          type: string
          description: 학교명
          example: 국민대학교
          maxLength: 30
          minLength: 0
        gender:
          type: string
          description: 성별
          enum:
          - MALE
          - FEMALE
          example: MALE
        mbti:
          type: string
          description: MBTI(영문 4자)
          example: ENFP
          minLength: 1
          pattern: "^[A-Za-z]{4}$"
        drinkLevel:
          type: string
          description: 주량
          example: 소주 3잔
          maxLength: 20
          minLength: 0
        favoriteFood:
          type: string
          description: 좋아하는 음식
