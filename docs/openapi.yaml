openapi: 3.1.0
info:
  title: Qnect API
  description: Qnect 백엔드 API (계정 · 프로필 · 관심사)
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- bearerAuth: []
tags:
- name: 퀴즈
  description: AI 퀴즈 생성·편집·응시 API
- name: 알림
  description: 인앱 알림(벨) 목록/읽음 API
- name: 관심사
  description: 관심사 마스터 조회 및 내 관심사 설정 API
- name: 데일리
  description: 데일리 밸런스 게임 + 통계 API
- name: 그룹
  description: "그룹 생성/수정/삭제/검색, 멤버 관리 API"
- name: 인증
  description: "회원가입, 로그인, 토큰 갱신/로그아웃 등 인증 관련 API"
- name: 친구
  description: "친구 추가/수락/거절, 친구 목록, 메모 API"
- name: 포인트
  description: "포인트 잔액/내역, 출석 체크 API"
- name: 프로필
  description: 프로필 조회·작성·공유 API
- name: 상점
  description: 캐릭터/QR 꾸미기 아이템 구매·적용 API
paths:
  /api/quizzes/me:
    get:
      tags:
      - 퀴즈
      summary: 내 퀴즈 조회
      description: 현재 활성화된 내 퀴즈를 정답 포함 편집 뷰로 반환한다. 아직 없으면 404(QUIZ_NOT_FOUND).
      operationId: getMine
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResponse"
    put:
      tags:
      - 퀴즈
      summary: 퀴즈 편집·저장
      description: 문항/보기를 직접 작성·수정·추가해 내 활성 퀴즈를 전체 교체한다(문항 3~5개).
      operationId: save
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSaveRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResponse"
  /api/profiles/me:
    get:
      tags:
      - 프로필
      summary: 내 프로필 조회
      description: 내 프로필을 반환한다. 미작성이면 기본정보만 채우고 profileCompleted=false 로 내려준다.
      operationId: getMine_1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProfileResponse"
    put:
      tags:
      - 프로필
      summary: 프로필 작성·수정
      description: 프로필을 생성하거나 전체 교체한다. 온보딩·수정 공용.
      operationId: upsert
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileRequest"
        required: true
      responses:
        "400":
          description: 입력값 검증 실패
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProfileResponse"
  /api/interests/me:
    get:
      tags:
      - 관심사
      summary: 내 관심사 조회
      description: 현재 로그인한 사용자가 설정한 관심사 목록을 반환한다.
      operationId: getMine_2
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListInterestResponse"
    put:
      tags:
      - 관심사
      summary: 내 관심사 전체 교체
      description: 내 관심사를 요청 목록으로 전체 교체한다. 빈 배열은 전체 해제를 의미한다.
      operationId: replaceMine
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterestUpdateRequest"
        required: true
      responses:
        "404":
          description: "INTEREST_NOT_FOUND: 존재하지 않는 관심사 ID가 포함됨"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListInterestResponse"
  /api/groups/{groupId}:
    put:
      tags:
      - 그룹
      summary: 그룹 수정
      description: 그룹 이름·해시태그를 수정한다. 본인 그룹만 가능.
      operationId: update
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupResponse"
    delete:
      tags:
      - 그룹
      summary: 그룹 삭제
      description: 그룹을 삭제한다. 멤버도 함께 삭제됨. 본인 그룹만 가능.
      operationId: delete
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/friends/memos:
    put:
      tags:
      - 친구
      summary: 친구 메모 작성/수정
      description: 친구에 대한 비공개 메모를 작성하거나 수정한다(upsert). 최대 200자.
      operationId: upsertMemo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FriendMemoRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFriendMemoResponse"
  /api/shop/items/{itemId}/purchase:
    post:
      tags:
      - 상점
      summary: 아이템 구매
      description: "포인트로 아이템을 구매한다. 잔액 부족 시 INSUFFICIENT_POINT, 이미 보유 시 거부."
      operationId: purchase
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserItemResponse"
  /api/quizzes/owner/{ownerId}/attempts:
    post:
      tags:
      - 퀴즈
      summary: 퀴즈 응시·채점
      description: 친구 퀴즈에 답을 제출하고 채점 결과를 받는다. 프로필 완성 필요. 첫 풀기면 포인트가 적립된다.
      operationId: solve
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizAttemptRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResultResponse"
  /api/quizzes/me/generate:
    post:
      tags:
      - 퀴즈
      summary: AI 문제 초안 생성
      description: 내 프로필 기반으로 AI가 문제 초안 여러 개를 생성해 반환한다(저장하지 않음). 클라이언트가 '내 퀴즈 목록'에
        추가·편집한 뒤 PUT /me 로 저장한다. 기존 퀴즈를 덮어쓰지 않는다.
      operationId: generate
      parameters:
      - name: arg1
        in: query
        description: 퀴즈 종류(기본 FIRST_MEET)
        required: false
        schema:
          type: string
          default: FIRST_MEET
          enum:
          - FIRST_MEET
          - REMIND
      - name: arg2
        in: query
        description: "생성할 문제 수(1~5, 기본 3)"
        required: false
        schema:
          type: integer
          format: int32
          default: 3
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseAiQuizDraftResponse"
  /api/profiles/characters:
    get:
      tags:
      - 프로필
      summary: 캐릭터 카탈로그 조회
      description: 프로필 이미지로 선택 가능한 캐릭터 17종을 반환한다.
      operationId: getCharacters
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListCharacterResponse"
  /api/profiles/me/image:
    put:
      tags:
      - 프로필
      summary: 프로필 이미지(캐릭터) 설정
      description: 카탈로그의 캐릭터 식별자로 프로필 이미지를 설정한다. 무효 식별자는 400, 프로필 없으면 404.
      operationId: setImage
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileImageRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseImageResponse"
        "400":
          description: 무효 캐릭터 식별자(INVALID_INPUT)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseImageResponse"
        "404":
          description: 프로필 없음(PROFILE_NOT_FOUND)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseImageResponse"
  /api/points/attendance:
    post:
      tags:
      - 포인트
      summary: 출석 체크
      description: 하루 1회 5P 지급. 이미 출석했으면 earnedToday=false(에러 아님).
      operationId: checkAttendance
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseAttendanceResult"
  /api/groups:
    get:
      tags:
      - 그룹
      summary: 내 그룹 목록
      description: 로그인한 사용자가 생성한 그룹 목록을 조회합니다.
      operationId: myGroups
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListGroupResponse"
    post:
      tags:
      - 그룹
      summary: 그룹 생성
      description: "멤버 없이 그룹만 생성한다. 5개까지 무료, 6번째부터는 생성 시 포인트 10점 차감."
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupCreateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupResponse"
  /api/groups/{groupId}/members:
    get:
      tags:
      - 그룹
      summary: 그룹 멤버 목록 조회
      description: 지정한 그룹에 속한 멤버 목록을 조회합니다.
      operationId: members
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListGroupMemberResponse"
    post:
      tags:
      - 그룹
      summary: 그룹에 멤버 추가
      description: 그룹에 친구를 추가한다. 추가한 친구만 가능.
      operationId: addMember
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupMemberAddRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupMemberResponse"
  /api/groups/with-members:
    post:
      tags:
      - 그룹
      summary: 그룹 생성 및 멤버 추가
      description: "그룹 이름, 해시태그, 친구 ID 목록을 받아 그룹을 생성하고 선택한 친구들을 멤버로 추가합니다. 5개까지 무료\
        , 6번째부터는 생성 시 포인트 10점 차감."
      operationId: createWithMembers
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupCreateWithMembersRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupWithMembersResponse"
  /api/friends:
    get:
      tags:
      - 친구
      summary: 내 친구 목록
      description: 수락된(ACCEPTED) 친구 전체를 반환한다.
      operationId: getFriends
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListFriendResponse"
    post:
      tags:
      - 친구
      summary: 친구 추가 요청
      description: 상대(addresseeId)에게 친구 요청을 보낸다. 중복 요청·자기 자신 요청은 거부.
      operationId: request
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FriendRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFriendResponse"
  /api/daily/today/answer:
    post:
      tags:
      - 데일리
      summary: 데일리 답변 제출
      description: 오늘의 데일리에 A/B 로 답한다(1인 1회). 제출 후 통계를 함께 반환한다.
      operationId: answer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyAnswerRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDailyStatsResponse"
  /api/auth/signup:
    post:
      tags:
      - 인증
      summary: 회원가입
      description: 신규 회원을 등록하고 가입 즉시 액세스/리프레시 토큰을 발급한다.
      operationId: signup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
        required: true
      responses:
        "409":
          description: 이미 사용 중인 아이디(DUPLICATE_LOGIN_ID) 또는 전화번호(DUPLICATE_PHONE)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTokenResponse"
        "400":
          description: 입력값 검증 실패
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTokenResponse"
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTokenResponse"
  /api/auth/refresh:
    post:
      tags:
      - 인증
      summary: 토큰 갱신
      description: 리프레시 토큰으로 새 토큰을 발급한다(리프레시 토큰 회전).
      operationId: refresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
        required: true
      responses:
        "401":
          description: 유효하지 않거나 만료된 리프레시 토큰
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTokenResponse"
  /api/auth/logout:
    post:
      tags:
      - 인증
      summary: 로그아웃
      description: 리프레시 토큰을 무효화한다.
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/auth/login:
    post:
      tags:
      - 인증
      summary: 로그인
      description: 아이디/비밀번호로 인증하고 토큰을 발급한다.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "401":
          description: 아이디 또는 비밀번호 불일치(INVALID_CREDENTIALS)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTokenResponse"
  /api/shop/my-items/{userItemId}/unequip:
    patch:
      tags:
      - 상점
      summary: 아이템 해제
      description: 아이템을 해제한다. 캐릭터 해제 시 기본 띠 캐릭터로 복귀.
      operationId: unequip
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/shop/my-items/{userItemId}/equip:
    patch:
      tags:
      - 상점
      summary: 아이템 적용
      description: "프로필에서 하나만 적용할 수 있으며, 새로운 캐릭터를 프로필에 적용하면 기존 프로필에 적용된 캐릭터는 자동으로\
        \ 해제됩니다."
      operationId: equip
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/notifications/{notificationId}/read:
    patch:
      tags:
      - 알림
      summary: 알림 읽음 처리
      description: 읽은 알림을 읽음 상태로 변경한다.
      operationId: markAsRead
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/friends/{friendshipId}/reject:
    patch:
      tags:
      - 친구
      summary: 친구 요청 거절
      description: 받은 친구 요청을 거절한다. 요청 받은 사람만 가능.
      operationId: reject
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFriendResponse"
  /api/friends/{friendshipId}/accept:
    patch:
      tags:
      - 친구
      summary: 친구 요청 수락
      description: 받은 친구 요청을 수락한다. 요청 받은 사람만 가능. 수락 시 알림·리마인드·마일스톤 자동 처리.
      operationId: accept
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFriendResponse"
  /api/shop/my-items:
    get:
      tags:
      - 상점
      summary: 내 보유 아이템
      description: 내가 구매한 아이템과 적용 상태를 반환한다.
      operationId: getMyItems
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListUserItemResponse"
  /api/shop/items:
    get:
      tags:
      - 상점
      summary: 상점 아이템 목록
      description: 판매중인 캐릭터(200P)·QR 꾸미기(150P)을 반환한다.
      operationId: getItems
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListShopItemResponse"
  /api/quizzes/owner/{ownerId}:
    get:
      tags:
      - 퀴즈
      summary: 친구 퀴즈 조회
      description: 친구(ownerId)의 활성 퀴즈를 푸는 화면용으로 조회한다(정답 미노출). 내 프로필 미완성 시 solvable=false.
      operationId: getFriendQuiz
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseSolvableQuizResponse"
  /api/quizzes/attempts/{attemptId}:
    get:
      tags:
      - 퀴즈
