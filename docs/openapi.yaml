      description: 통장 내역처럼 적립/차감 기록을 최신순으로 반환한다.
      operationId: getTransactions
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListPointTransactionResponse"
  /api/points/balance:
    get:
      tags:
      - 포인트
      summary: 내 포인트 잔액
      description: 현재 포인트 잔액을 반환한다(포인트 값).
      operationId: getBalance
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePointBalanceResponse"
  /api/notifications:
    get:
      tags:
      - 알림
      summary: 내 알림 목록
      description: 내 알림을 최신순으로 반환한다. type+refId로 화면 이동 결정.
      operationId: getMyNotifications
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListNotificationResponse"
  /api/notifications/unread-count:
    get:
      tags:
      - 알림
      summary: 안 읽은 알림 개수
      description: 읽지 않은 알림 개수를 조회합니다.
      operationId: getUnreadCount
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseLong"
  /api/interests:
    get:
      tags:
      - 관심사
      summary: 전체 관심사 조회
      description: 선택 가능한 전체 관심사를 카테고리별로 묶어 반환한다.
      operationId: getAll
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListInterestCategoryResponse"
  /api/groups/search:
    get:
      tags:
      - 그룹
      summary: 그룹명 검색
      description: 그룹 이름으로 검색한다(해시태그는 검색 안 함).
      operationId: search
      parameters:
      - name: arg1
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListGroupResponse"
  /api/friends/summaries:
    get:
      tags:
      - 친구
