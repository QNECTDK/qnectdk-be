      type: object
      properties:
        loginId:
          type: string
          description: 로그인 아이디 (영문 소문자로 시작하는 4~20자)
          example: tester01
          minLength: 1
          pattern: "^[a-z][a-z0-9_]{3,19}$"
        phone:
          type: string
          description: 전화번호 (010으로 시작하는 11자리 숫자)
          example: "01012345678"
          minLength: 1
          pattern: "^010\\d{8}$"
        password:
          type: string
          description: 비밀번호 (영문과 숫자를 포함한 8자 이상)
          example: test1234
          maxLength: 64
          minLength: 8
          pattern: "^(?=.*[A-Za-z])(?=.*\\d).+$"
        name:
          type: string
          description: 이름 (최대 20자)
          example: 홍길동
          maxLength: 20
          minLength: 0
        birthDate:
          type: string
          format: date
          description: 생년월일 (과거 날짜)
          example: 2003-05-01
      required:
      - birthDate
      - loginId
      - name
      - password
      - phone
