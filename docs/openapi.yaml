openapi: 3.1.0
info:
  title: Qnect API
  description: |
    Qnect 백엔드 API — 대학생 인맥 관리 앱 (인증 · 프로필 · 관심사 · 퀴즈 · 데일리 · 친구 · 그룹 · 포인트 · 상점 · 알림).

    ## 공통 응답 포맷 (ApiResponse)
    모든 응답은 아래 봉투(envelope) 형태로 내려간다. (null 필드는 직렬화에서 제외)
    - **성공:** `{ "success": true, "data": {...}, "error": null }`
    - **실패:** `{ "success": false, "data": null, "error": { "code": "INVALID_INPUT", "message": "...", "fields": { "필드명": "메시지" } } }`

    `error.fields`는 **Bean Validation(요청 바디 검증) 실패 시에만** 채워지는 필드별 메시지 맵이다. 그 외 에러는 `fields=null`.

    ## 에러 처리 가이드 (프론트 공통)
    프론트는 HTTP status 와 `error.code`(문자열)로 분기하면 된다. 모든 에러 바디는 동일한 봉투 형태다.

    ### 전역 에러 (모든 엔드포인트 공통 — 각 엔드포인트에 매번 표기하지 않음)
    | status | code | 발생 상황 |
    |--------|------|-----------|
    | 400 | `INVALID_INPUT` | 요청 바디 Bean Validation 실패(→ `fields`), JSON 파싱 실패/바디 누락, 경로·쿼리 파라미터 타입 불일치(enum 오타·숫자 자리 문자), 필수 파라미터 누락 |
    | 401 | `UNAUTHORIZED` | 토큰 없음/유효하지 않음 — 인증 필요한 모든 엔드포인트에서 가능 |
    | 403 | `ACCESS_DENIED` | 인가 실패(권한 없음) |
    | 405 | `METHOD_NOT_ALLOWED` | 지원하지 않는 HTTP 메서드 |
    | 409 | `RESOURCE_CONFLICT` | 동시 요청 레이스로 unique 제약 위반 |
    | 500 | `INTERNAL_ERROR` | 처리되지 않은 서버 오류 |

    > 인증: `Authorization: Bearer {accessToken}` 헤더 필요. **`/api/auth/**` 만 인증 불필요.**
    > 그 외 모든 엔드포인트는 토큰이 없거나 만료되면 **401 `UNAUTHORIZED`** 로 응답한다(개별 표기 생략).

    ### 도메인 에러 코드 카탈로그
    각 엔드포인트의 응답 목록에 코드명을 표기한다. 전체 코드는 다음과 같다.
    | code | status | message |
    |------|--------|---------|
    | `INVALID_CREDENTIALS` | 401 | 아이디 또는 비밀번호가 올바르지 않습니다. |
    | `INVALID_TOKEN` | 401 | 유효하지 않은 토큰입니다. |
    | `EXPIRED_TOKEN` | 401 | 만료된 토큰입니다. |
    | `DUPLICATE_LOGIN_ID` | 409 | 이미 사용 중인 아이디입니다. |
    | `DUPLICATE_PHONE` | 409 | 이미 가입된 전화번호입니다. |
    | `USER_NOT_FOUND` | 404 | 사용자를 찾을 수 없습니다. |
    | `PROFILE_NOT_FOUND` | 404 | 프로필을 찾을 수 없습니다. |
    | `INTEREST_NOT_FOUND` | 404 | 존재하지 않는 관심사가 포함되어 있습니다. |
    | `QUIZ_NOT_FOUND` | 404 | 퀴즈를 찾을 수 없습니다. |
    | `QUIZ_ATTEMPT_NOT_FOUND` | 404 | 퀴즈 응시 기록을 찾을 수 없습니다. |
    | `QUIZ_FORBIDDEN` | 403 | 해당 퀴즈에 대한 권한이 없습니다. |
    | `QUIZ_NOT_SOLVABLE` | 403 | 프로필을 먼저 완성해야 퀴즈를 풀 수 있습니다. |
    | `QUIZ_INVALID_CONTENT` | 400 | 퀴즈 구성이 올바르지 않습니다. |
    | `QUIZ_GENERATION_FAILED` | 502 | 퀴즈 자동 생성에 실패했습니다. |
    | `DAILY_QUIZ_NOT_FOUND` | 404 | 오늘의 데일리 퀴즈가 없습니다. |
    | `DAILY_ALREADY_ANSWERED` | 409 | 이미 오늘의 데일리에 답했습니다. |
    | `DAILY_NOT_ANSWERED_YET` | 403 | 먼저 답해야 결과를 볼 수 있습니다. |
    | `FRIENDSHIP_NOT_FOUND` | 404 | 친구 요청을 찾을 수 없습니다. |
    | `ALREADY_FRIENDS` | 409 | 이미 친구이거나 요청이 존재합니다. |
    | `FRIENDSHIP_NOT_PENDING` | 409 | 대기 중인 요청만 처리할 수 있습니다. |
    | `NOT_FRIENDSHIP_ADDRESSEE` | 403 | 요청을 받은 사람만 수락/거절할 수 있습니다. |
    | `MEMO_NOT_FOUND` | 404 | 메모를 찾을 수 없습니다. |
    | `GROUP_NOT_FOUND` | 404 | 그룹을 찾을 수 없습니다. |
    | `NOT_GROUP_OWNER` | 403 | 본인의 그룹만 관리할 수 있습니다. |
    | `DUPLICATE_GROUP_NAME` | 409 | 이미 같은 이름의 그룹이 있습니다. |
    | `NOT_ACCEPTED_FRIEND` | 400 | 수락된 친구만 그룹에 추가할 수 있습니다. |
    | `ALREADY_GROUP_MEMBER` | 409 | 이미 그룹에 추가된 친구입니다. |
    | `GROUP_MEMBER_NOT_FOUND` | 404 | 그룹에 없는 멤버입니다. |
    | `INSUFFICIENT_POINT` | 409 | 포인트가 부족합니다. |
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- bearerAuth: []
tags:
- name: 상점
  description: |
    캐릭터 아이템을 포인트로 구매·장착. 장착 = 그 캐릭터를 내 프로필 사진으로 등록.
    [흐름] 목록(GET /items) → 구매(POST /items/{id}/purchase, 포인트 차감) → 보유(GET /my-items) → 장착/해제.
    캐릭터: 생년월일 띠 캐릭터가 기본 프사(무료). 17종 전부 200P 구매 가능.
    장착은 type별 하나만 — 다른 캐릭터를 장착하면 기존 것은 자동 해제(= 캐릭터 교체).
    해제하면 장착이 풀리고 기본 띠 캐릭터로 복귀. characterId는 캐릭터 식별용 코드이며, 실제 이미지는 프론트에서 관리한다.
- name: 퀴즈
  description: AI 퀴즈 생성·편집·응시 API
- name: 친구
  description: |
    친구 관계 관리.
    [흐름] 친구요청(POST /api/friends) → 받은요청 조회(GET /requests/received) → 수락(PATCH /{id}/accept) 또는 거절.
    수락 시 자동: 요청자에게 알림 발송 + 양쪽 30일 리마인드 예약 + 친구수 마일스톤 포인트 체크.
    친구 목록·받은 요청은 person 카드(학교·MBTI·관심사 등 포함)와 함께 내려준다. 자동완성(/summaries)은 id+이름+characterId만 제공.
- name: 관심사
  description: 관심사 마스터 조회 및 내 관심사 설정 API
- name: 알림
  description: |
    인앱 알림(벨). 백엔드가 이벤트 발생 시 자동 생성하며, 프론트는 조회/읽음만.
    [흐름] 목록(GET /api/notifications) + 안읽은수(GET /unread-count, 벨 배지) → 클릭 시 읽음(PATCH /{id}/read).
    type+refId로 이동 화면 결정(NotificationType 스키마 참고). 여러 명이 추가해도 한 명당 한 줄씩 쌓임.
- name: 데일리
  description: 데일리 밸런스 게임 + 통계 API
- name: 포인트
  description: |
    포인트(원장 방식: 거래내역 + 잔액캐시).
    [흐름] 앱 진입 시 출석(POST /api/points/attendance, 하루 1회 5P) → 잔액(GET /balance) → 내역(GET /transactions).
    대부분 적립은 백엔드 자동(친구 수락, 퀴즈 등). 프론트가 직접 호출하는 적립은 출석뿐.
    잔액은 현재 포인트를 즉시 조회하며, 거래 내역은 적립·차감 기록을 최신순으로 반환한다.
- name: 인증
  description: "회원가입, 로그인, 토큰 갱신/로그아웃 등 인증 관련 API"
- name: 그룹
  description: |
    친구를 묶는 그룹(카테고리). 무료 5개, 초과 시 생성마다 10P 차감.
    [생성 진입 2가지] (1) 그룹 생성 화면: 친구 이름 '검색'으로 멤버 등록  (2) 친구 목록 화면: 친구 여러 명 '선택' 후 그룹 생성.
    두 경로 모두 friendIds(친구 id 배열)를 담아 POST /api/groups/with-members 한 번 호출(권장).
    멤버는 내 ACCEPTED 친구만 가능. 그룹명은 사용자별 중복 불가.
    인원수는 멤버 목록 길이로 카운트(저장값 없음). 해시태그는 #없는 문자열 배열로 입출력(저장 시 내부적으로 합쳐짐).
    멤버 목록·멤버 추가 응답은 person 카드(학교·MBTI·관심사 등 포함)와 함께 내려준다.
- name: 프로필
  description: 프로필 조회·작성·공유 API
paths:
  /api/quizzes/me:
    get:
      tags:
      - 퀴즈
      summary: 내 퀴즈 조회
      description: 현재 활성화된 내 퀴즈를 정답 포함 편집 뷰로 반환한다. 아직 없으면 404(QUIZ_NOT_FOUND).
      operationId: getMine
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResponse"
        "404":
          description: 활성화된 퀴즈가 없음 (QUIZ_NOT_FOUND)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
    put:
      tags:
      - 퀴즈
      summary: 퀴즈 편집·저장
      description: 문항/보기를 직접 작성·수정·추가해 내 활성 퀴즈를 전체 교체한다(문항 3~5개).
      operationId: save
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSaveRequest"
        required: true
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResponse"
        "400":
          description: 문항/보기 정합성 검증 실패 (QUIZ_INVALID_CONTENT)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
    delete:
      tags:
      - 퀴즈
      summary: 내 퀴즈 삭제
      description: 내 활성 퀴즈의 문항·보기를 제거하고 비활성화한다. 활성 퀴즈가 없으면 404(QUIZ_NOT_FOUND).
      operationId: deleteMine
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/profiles/me:
    get:
      tags:
      - 프로필
      summary: 내 프로필 조회
      description: 내 프로필을 반환한다. 미작성이면 기본정보만 채우고 profileCompleted=false 로 내려준다.
      operationId: getMine_1
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProfileResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
    put:
      tags:
      - 프로필
      summary: 프로필 작성·수정
      description: 프로필을 생성하거나 전체 교체한다. 온보딩·수정 공용.
      operationId: upsert
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileRequest"
        required: true
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProfileResponse"
        "400":
          description: 입력값 검증 실패
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProfileResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/profiles/me/image:
    put:
      tags:
      - 프로필
      summary: 프로필 이미지(캐릭터) 설정
      description: "카탈로그의 캐릭터 식별자로 프로필 이미지를 설정한다. 무효 식별자는 400, 프로필 없으면 404."
      operationId: setImage
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileImageRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseImageResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "400":
          description: 입력값 검증 실패 — INVALID_INPUT. Bean Validation 실패 시 error.fields
            에 필드별 메시지.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/interests/me:
    get:
      tags:
      - 관심사
      summary: 내 관심사 조회
      description: 현재 로그인한 사용자가 설정한 관심사 목록을 반환한다.
      operationId: getMine_2
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListInterestResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
    put:
      tags:
      - 관심사
      summary: 내 관심사 전체 교체
      description: 내 관심사를 요청 목록으로 전체 교체한다. 빈 배열은 전체 해제를 의미한다.
      operationId: replaceMine
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterestUpdateRequest"
        required: true
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListInterestResponse"
        "404":
          description: "INTEREST_NOT_FOUND: 존재하지 않는 관심사 ID가 포함됨"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListInterestResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "400":
          description: 입력값 검증 실패 — INVALID_INPUT. Bean Validation 실패 시 error.fields
            에 필드별 메시지.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/groups/{groupId}:
    put:
      tags:
      - 그룹
      summary: 그룹 수정
      description: 그룹 이름·해시태그를 수정한다. 본인 그룹만 가능.
      operationId: update
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdateRequest"
        required: true
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupResponse"
        "404":
          description: 그룹을 찾을 수 없음 (GROUP_NOT_FOUND)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupResponse"
        "403":
          description: 본인 그룹이 아님 (NOT_GROUP_OWNER)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupResponse"
        "409":
          description: 같은 이름의 그룹이 이미 있음 (DUPLICATE_GROUP_NAME)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "400":
          description: 입력값 검증 실패 — INVALID_INPUT. Bean Validation 실패 시 error.fields
            에 필드별 메시지.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
    delete:
      tags:
