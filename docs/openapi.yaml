openapi: 3.1.0
info:
  title: Qnect API
  description: |
    Qnect 백엔드 API — 대학생 인맥 관리 앱 (인증 · 프로필 · 관심사 · 퀴즈 · 데일리 · 친구 · 그룹 · 포인트 · 상점 · 알림).

    ## 공통 응답 포맷 (ApiResponse)
    모든 응답은 아래 봉투(envelope) 형태로 내려간다. (null 필드는 직렬화에서 제외)
    - **성공:** `{ "success": true, "data": {...}, "error": null }`
    - **실패:** `{ "success": false, "data": null, "error": { "code": "INVALID_INPUT", "message": "...", "fields": { "필드명": "메시지" } } }`

    `error.fields`는 **Bean Validation(요청 바디 검증) 실패 시에만** 채워지는 필드별 메시지 맵이다. 그 외 에러는 `fields=null`.

    ## 에러 처리 가이드 (프론트 공통)
    프론트는 HTTP status 와 `error.code`(문자열)로 분기하면 된다. 모든 에러 바디는 동일한 `ApiResponseVoid` 형태다.

    ### 전역 에러 (모든 엔드포인트 공통 — 각 엔드포인트에 매번 표기하지 않음)
    | status | code | 발생 상황 |
    |--------|------|-----------|
    | 400 | `INVALID_INPUT` | 요청 바디 Bean Validation 실패(→ `fields`), JSON 파싱 실패/바디 누락, 경로·쿼리 파라미터 타입 불일치(enum 오타·숫자 자리 문자), 필수 파라미터 누락 |
    | 401 | `UNAUTHORIZED` | 토큰 없음/유효하지 않음 — 인증 필요한 모든 엔드포인트에서 가능 |
    | 403 | `ACCESS_DENIED` | 인가 실패(권한 없음) |
    | 405 | `METHOD_NOT_ALLOWED` | 지원하지 않는 HTTP 메서드 |
    | 409 | `RESOURCE_CONFLICT` | 동시 요청 레이스로 unique 제약 위반 |
    | 500 | `INTERNAL_ERROR` | 처리되지 않은 서버 오류 |

    > 인증: `Authorization: Bearer {accessToken}` 헤더 필요. **`/api/auth/**` 만 인증 불필요.**
    > 그 외 모든 엔드포인트는 토큰이 없거나 만료되면 **401 `UNAUTHORIZED`** 로 응답한다(개별 표기 생략).

    ### 도메인 에러 코드 카탈로그
    각 엔드포인트의 응답 목록에 코드명을 표기한다. 전체 코드는 다음과 같다.
    | code | status | message |
    |------|--------|---------|
    | `INVALID_CREDENTIALS` | 401 | 아이디 또는 비밀번호가 올바르지 않습니다. |
    | `INVALID_TOKEN` | 401 | 유효하지 않은 토큰입니다. |
    | `EXPIRED_TOKEN` | 401 | 만료된 토큰입니다. |
    | `DUPLICATE_LOGIN_ID` | 409 | 이미 사용 중인 아이디입니다. |
    | `DUPLICATE_PHONE` | 409 | 이미 가입된 전화번호입니다. |
    | `USER_NOT_FOUND` | 404 | 사용자를 찾을 수 없습니다. |
    | `PROFILE_NOT_FOUND` | 404 | 프로필을 찾을 수 없습니다. |
    | `INTEREST_NOT_FOUND` | 404 | 존재하지 않는 관심사가 포함되어 있습니다. |
    | `QUIZ_NOT_FOUND` | 404 | 퀴즈를 찾을 수 없습니다. |
    | `QUIZ_ATTEMPT_NOT_FOUND` | 404 | 퀴즈 응시 기록을 찾을 수 없습니다. |
    | `QUIZ_FORBIDDEN` | 403 | 해당 퀴즈에 대한 권한이 없습니다. |
    | `QUIZ_NOT_SOLVABLE` | 403 | 프로필을 먼저 완성해야 퀴즈를 풀 수 있습니다. |
    | `QUIZ_INVALID_CONTENT` | 400 | 퀴즈 구성이 올바르지 않습니다. |
    | `QUIZ_GENERATION_FAILED` | 502 | 퀴즈 자동 생성에 실패했습니다. |
    | `DAILY_QUIZ_NOT_FOUND` | 404 | 오늘의 데일리 퀴즈가 없습니다. |
    | `DAILY_ALREADY_ANSWERED` | 409 | 이미 오늘의 데일리에 답했습니다. |
    | `DAILY_NOT_ANSWERED_YET` | 403 | 먼저 답해야 결과를 볼 수 있습니다. |
    | `FRIENDSHIP_NOT_FOUND` | 404 | 친구 요청을 찾을 수 없습니다. |
    | `ALREADY_FRIENDS` | 409 | 이미 친구이거나 요청이 존재합니다. |
    | `FRIENDSHIP_NOT_PENDING` | 409 | 대기 중인 요청만 처리할 수 있습니다. |
    | `NOT_FRIENDSHIP_ADDRESSEE` | 403 | 요청을 받은 사람만 수락/거절할 수 있습니다. |
    | `MEMO_NOT_FOUND` | 404 | 메모를 찾을 수 없습니다. |
    | `GROUP_NOT_FOUND` | 404 | 그룹을 찾을 수 없습니다. |
    | `NOT_GROUP_OWNER` | 403 | 본인의 그룹만 관리할 수 있습니다. |
    | `DUPLICATE_GROUP_NAME` | 409 | 이미 같은 이름의 그룹이 있습니다. |
    | `NOT_ACCEPTED_FRIEND` | 400 | 수락된 친구만 그룹에 추가할 수 있습니다. |
    | `ALREADY_GROUP_MEMBER` | 409 | 이미 그룹에 추가된 친구입니다. |
    | `GROUP_MEMBER_NOT_FOUND` | 404 | 그룹에 없는 멤버입니다. |
    | `INSUFFICIENT_POINT` | 409 | 포인트가 부족합니다. |
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- bearerAuth: []
tags:
- name: 퀴즈
  description: AI 퀴즈 생성·편집·응시 API
- name: 알림
  description: 인앱 알림(벨) 목록/읽음 API
- name: 관심사
  description: 관심사 마스터 조회 및 내 관심사 설정 API
- name: 데일리
  description: 데일리 밸런스 게임 + 통계 API
- name: 그룹
  description: "그룹 생성/수정/삭제/검색, 멤버 관리 API"
- name: 인증
  description: "회원가입, 로그인, 토큰 갱신/로그아웃 등 인증 관련 API"
- name: 친구
  description: "친구 추가/수락/거절, 친구 목록, 메모 API"
- name: 포인트
  description: "포인트 잔액/내역, 출석 체크 API"
- name: 프로필
  description: 프로필 조회·작성·공유 API
- name: 상점
  description: 캐릭터/QR 꾸미기 아이템 구매·적용 API
paths:
  /api/quizzes/friends:
    get:
      tags:
      - 퀴즈
      summary: 친구 퀴즈 목록 조회
      description: "내 친구별 퀴즈 카드 목록을 반환한다. 친구마다 활성 퀴즈 유무(hasQuiz)·총문항\
        \ 수(totalQuestions)·내 최근 응시 여부(attempted)와 정답 수(score)를 담는다. 활성 퀴즈가\
        \ 없는 친구도 hasQuiz=false 로 포함된다. 화면은 person(캐릭터+이름) + 총문항(빈 동그라미)\
        \ + 내 정답수(채운 동그라미) + 버튼(미응시/완료)을 그린다."
      operationId: getFriendQuizzes
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListFriendQuizResponse"
        "401":
          description: 인증 필요 (UNAUTHORIZED)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/quizzes/reminders/today:
    get:
      tags:
      - 퀴즈
      summary: 홈 리마인드 카드 조회
      description: "홈 '이 사람을 기억하나요?' 카드용 — 오늘 복습 대상 친구 1명과 그 친구의 활성 퀴즈를\
        \ 반환한다. 대상이 없으면 data=null 로 응답한다(에러 아님). quizId 는 풀기 화면 진입에 사용한다."
      operationId: getTodayReminderCard
      responses:
        "200":
          description: OK (복습 대상이 없으면 data=null)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseReminderCardResponse"
        "401":
          description: 인증 필요 (UNAUTHORIZED)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/profiles/by-user/{userId}:
    get:
      tags:
      - 프로필
      summary: userId로 프로필 조회
      description: "userId 로 다른 사용자의 프로필을 조회한다(친구 목록 → 상세 진입용). 생년월일\
        \ birthDate(전체 날짜, 예 2005-03-16)를 포함한다. 나이·띠는 저장하지 않고 birthDate 로\
        \ 계산해 채운다."
      operationId: getByUserId
      parameters:
      - name: userId
        in: path
        description: 사용자 ID
        required: true
        schema:
          type: integer
          format: int64
        example: 34
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProfileResponse"
        "404":
          description: 해당 사용자를 찾을 수 없음 (USER_NOT_FOUND)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/quizzes/me:
    get:
      tags:
      - 퀴즈
      summary: 내 퀴즈 조회
      description: 현재 활성화된 내 퀴즈를 정답 포함 편집 뷰로 반환한다. 아직 없으면 404(QUIZ_NOT_FOUND).
      operationId: getMine
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: "활성화된 내 퀴즈가 없음 — QUIZ_NOT_FOUND"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
    put:
      tags:
      - 퀴즈
      summary: 퀴즈 편집·저장
      description: 문항/보기를 직접 작성·수정·추가해 내 활성 퀴즈를 전체 교체한다(문항 3~5개).
      operationId: save
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSaveRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResponse"
        "400":
          description: "입력값 검증 실패(INVALID_INPUT, 문항 3~5개·필드 제약) 또는 문항/보기 정합성 검증 실패(QUIZ_INVALID_CONTENT)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/profiles/me:
    get:
      tags:
      - 프로필
      summary: 내 프로필 조회
      description: 내 프로필을 반환한다. 미작성이면 기본정보만 채우고 profileCompleted=false 로 내려준다.
      operationId: getMine_1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags:
      - 프로필
      summary: 프로필 작성·수정
      description: 프로필을 생성하거나 전체 교체한다. 온보딩·수정 공용.
      operationId: upsert
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProfileResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/interests/me:
    get:
      tags:
      - 관심사
      summary: 내 관심사 조회
      description: 현재 로그인한 사용자가 설정한 관심사 목록을 반환한다.
      operationId: getMine_2
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListInterestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags:
      - 관심사
      summary: 내 관심사 전체 교체
      description: 내 관심사를 요청 목록으로 전체 교체한다. 빈 배열은 전체 해제를 의미한다.
      operationId: replaceMine
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterestUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListInterestResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: "존재하지 않는 관심사 ID가 포함됨 — INTEREST_NOT_FOUND"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/groups/{groupId}:
    put:
      tags:
      - 그룹
      summary: 그룹 수정
      description: 그룹 이름·해시태그를 수정한다. 본인 그룹만 가능.
      operationId: update
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseGroupResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "본인 그룹이 아님 — NOT_GROUP_OWNER"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "404":
          description: "그룹을 찾을 수 없음 — GROUP_NOT_FOUND"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "409":
          description: "같은 이름의 그룹이 이미 있음 — DUPLICATE_GROUP_NAME"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
    delete:
      tags:
      - 그룹
      summary: 그룹 삭제
      description: 그룹을 삭제한다. 멤버도 함께 삭제됨. 본인 그룹만 가능.
      operationId: delete
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "본인 그룹이 아님 — NOT_GROUP_OWNER"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "404":
          description: "그룹을 찾을 수 없음 — GROUP_NOT_FOUND"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/friends/memos:
    put:
      tags:
      - 친구
      summary: 친구 메모 작성/수정
      description: 친구에 대한 비공개 메모를 작성하거나 수정한다(upsert). 최대 200자.
      operationId: upsertMemo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FriendMemoRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFriendMemoResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/shop/items/{itemId}/purchase:
    post:
      tags:
      - 상점
      summary: 아이템 구매
      description: "포인트로 아이템을 구매한다. 잔액 부족 시 INSUFFICIENT_POINT, 이미 보유 시 RESOURCE_CONFLICT, 없거나 판매 중지된 아이템은 INVALID_INPUT."
      operationId: purchase
      parameters: []
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserItemResponse"
        "400":
          description: "존재하지 않거나 판매 중지된 아이템 — INVALID_INPUT"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: "포인트 부족(INSUFFICIENT_POINT) 또는 이미 보유한 아이템(RESOURCE_CONFLICT)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/quizzes/owner/{ownerId}/attempts:
    post:
      tags:
      - 퀴즈
      summary: 퀴즈 응시·채점
      description: "친구(ownerId) 퀴즈에 답을 제출하고 채점 결과를 받는다. 응시자 프로필이 완성돼야 풀 수 있다.\
        \ 해당 친구의 퀴즈를 **처음 푼 경우에만 포인트 +10P(QUIZ_FIRST_SOLVE)** 가 적립된다(친구 1명당 1회,\
        \ 재응시·재적립 없음). 채점 결과는 응시 즉시 반환되며 포인트 적립 성공 여부와 무관하게 201 로 응답한다."
      operationId: solve
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizAttemptRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseQuizResultResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "본인 퀴즈를 응시하려 함(QUIZ_FORBIDDEN) 또는 프로필 미완성으로 응시 불가(QUIZ_NOT_SOLVABLE)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "404":
          description: "해당 사용자의 활성 퀴즈가 없음 — QUIZ_NOT_FOUND"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/quizzes/me/generate:
    post:
      tags:
      - 퀴즈
      summary: AI 문제 초안 생성
      description: 내 프로필 기반으로 AI가 문제 초안 여러 개를 생성해 반환한다(저장하지 않음). 클라이언트가 '내 퀴즈 목록'에
        추가·편집한 뒤 PUT /me 로 저장한다. 기존 퀴즈를 덮어쓰지 않는다.
      operationId: generate
      parameters:
      - name: arg1
        in: query
        description: 퀴즈 종류(기본 FIRST_MEET)
        required: false
        schema:
          type: string
          default: FIRST_MEET
          enum:
          - FIRST_MEET
          - REMIND
      - name: arg2
        in: query
        description: "생성할 문제 수(1~5, 기본 3)"
        required: false
        schema:
          type: integer
          format: int32
          default: 3
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseAiQuizDraftResponse"
        "400":
          description: "AI가 생성한 문제 내용이 정합성 검증에 실패함(QUIZ_INVALID_CONTENT) 또는 잘못된 파라미터(INVALID_INPUT)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: "AI 퀴즈 생성 실패 — QUIZ_GENERATION_FAILED"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
