      summary: 받은 친구 요청 목록
      description: 내가 받은 대기중(PENDING) 친구 요청들을 요청자의 person 카드와 함께 반환한다.
      operationId: getReceivedRequests
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListReceivedFriendRequestResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/friends/memos/{friendId}:
    get:
      tags:
      - 친구
      summary: 친구 메모 조회
      description: 특정 친구에 대한 내 비공개 메모를 조회한다.
      operationId: getMemo
      parameters: []
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFriendMemoResponse"
        "404":
          description: 메모를 찾을 수 없음 (MEMO_NOT_FOUND)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFriendMemoResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/daily/today:
    get:
      tags:
      - 데일리
      summary: 오늘의 데일리 조회
      description: 오늘의 밸런스 질문과 내 답변 상태를 반환한다. 통계는 답한 뒤 별도 조회.
      operationId: getToday
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDailyTodayResponse"
        "404":
          description: 오늘의 데일리 퀴즈가 없음 (DAILY_QUIZ_NOT_FOUND)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDailyTodayResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/daily/today/stats:
    get:
      tags:
      - 데일리
      summary: 데일리 통계 조회
      description: 전체/친구 A·B 비율과 친구별 개별 선택을 반환한다. 내가 먼저 답해야 공개(미답변 시 403).
      operationId: stats
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDailyStatsResponse"
        "404":
          description: 오늘의 데일리 퀴즈가 없음 (DAILY_QUIZ_NOT_FOUND)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDailyStatsResponse"
        "403":
          description: 아직 답변하지 않아 통계를 볼 수 없음 (DAILY_NOT_ANSWERED_YET)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDailyStatsResponse"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/auth/check-login-id:
    get:
      tags:
      - 인증
      summary: 아이디 중복확인
      description: 주어진 로그인 아이디의 사용 가능 여부를 확인한다.
      operationId: checkLoginId
      parameters:
      - name: arg0
        in: query
        description: 중복 확인할 로그인 아이디
        required: true
        schema:
          type: string
        example: tester01
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCheckLoginIdResponse"
        "400":
          description: 아이디 형식이 올바르지 않음 (INVALID_INPUT)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCheckLoginIdResponse"
  /api/groups/{groupId}/members/{friendId}:
    delete:
      tags:
      - 그룹
      summary: 그룹에서 멤버 제거
      description: 그룹에서 특정 멤버를 제거한다.
      operationId: removeMember
      parameters: []
      responses:
        "200":
          description: 요청 성공
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "404":
          description: 그룹에 없는 멤버임 (GROUP_MEMBER_NOT_FOUND)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "403":
          description: 본인 그룹이 아님 (NOT_GROUP_OWNER)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "401":
          description: 인증 필요 — UNAUTHORIZED. 토큰이 없거나 유효하지 않음/만료됨.
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
components:
  schemas:
    OptionInput:
      type: object
      properties:
        content:
          type: string
          description: 보기 텍스트
          example: 여름
          maxLength: 255
          minLength: 0
        correct:
          type: boolean
          description: 정답 보기 여부
          example: true
      required:
      - content
    QuestionInput:
      type: object
      properties:
        type:
          type: string
          description: 문항 종류(MULTIPLE/OX)
          enum:
          - MULTIPLE
          - OX
        content:
          type: string
          description: 질문
          example: 내가 좋아하는 계절은?
          maxLength: 255
          minLength: 0
        correctAnswer:
          type: string
          description: "정답(OX=O/X, 객관식=정답 보기 텍스트)"
          example: O
          maxLength: 255
          minLength: 0
        required:
          type: boolean
          description: 필수 출제 여부
          example: true
        options:
          type: array
          description: 객관식 보기(OX는 생략/빈 목록)
          items:
            $ref: "#/components/schemas/OptionInput"
      required:
      - content
      - correctAnswer
      - type
    QuizSaveRequest:
      type: object
      properties:
        questions:
          type: array
          description: 문항 목록(3~5개)
          items:
            $ref: "#/components/schemas/QuestionInput"
          maxItems: 5
          minItems: 3
      required:
      - questions
    ApiResponseQuizResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: "#/components/schemas/QuizResponse"
          description: 성공 시 응답 데이터 (실패 시 null)
        error:
          $ref: "#/components/schemas/ErrorDetail"
          description: 실패 시 에러 정보 (성공 시 null)
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: 에러 코드. HTTP status 와 함께 분기 키로 사용한다.
          enum:
          - INVALID_INPUT
          - METHOD_NOT_ALLOWED
          - UNAUTHORIZED
          - ACCESS_DENIED
          - RESOURCE_CONFLICT
          - INTERNAL_ERROR
          - INVALID_CREDENTIALS
          - INVALID_TOKEN
          - EXPIRED_TOKEN
          - DUPLICATE_LOGIN_ID
          - DUPLICATE_PHONE
          - USER_NOT_FOUND
          - PROFILE_NOT_FOUND
          - INTEREST_NOT_FOUND
          - QUIZ_NOT_FOUND
          - QUIZ_ATTEMPT_NOT_FOUND
          - QUIZ_FORBIDDEN
          - QUIZ_NOT_SOLVABLE
          - QUIZ_INVALID_CONTENT
          - QUIZ_GENERATION_FAILED
          - DAILY_QUIZ_NOT_FOUND
          - DAILY_ALREADY_ANSWERED
          - DAILY_NOT_ANSWERED_YET
          - FRIENDSHIP_NOT_FOUND
          - ALREADY_FRIENDS
          - FRIENDSHIP_NOT_PENDING
          - NOT_FRIENDSHIP_ADDRESSEE
          - MEMO_NOT_FOUND
          - GROUP_NOT_FOUND
          - NOT_GROUP_OWNER
          - DUPLICATE_GROUP_NAME
          - NOT_ACCEPTED_FRIEND
          - ALREADY_GROUP_MEMBER
          - GROUP_MEMBER_NOT_FOUND
          - INSUFFICIENT_POINT
          example: INVALID_INPUT
        message:
          type: string
          description: 에러 메시지
          example: 입력값이 올바르지 않습니다.
        fields:
          type: object
          additionalProperties:
            type: string
          description: 검증 실패 시 필드별 메시지 (해당 없으면 null)
    OptionView:
      type: object
      properties:
        optionId:
          type: integer
          format: int64
          description: 보기 ID
          example: 1
        content:
          type: string
          description: 보기 텍스트
          example: 여름
        correct:
          type: boolean
          description: 정답 보기 여부
          example: true
        seq:
          type: integer
          format: int32
          description: 보기 순서
          example: 1
    QuestionView:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
          description: 문항 ID
          example: 1
        type:
          type: string
          description: 문항 종류
          enum:
          - MULTIPLE
          - OX
        content:
          type: string
          description: 질문
          example: 내가 좋아하는 계절은?
        correctAnswer:
          type: string
          description: "정답(OX=O/X, 객관식=정답 보기 텍스트)"
          example: O
        required:
          type: boolean
          description: 필수 출제 여부
          example: true
        seq:
          type: integer
          format: int32
          description: 문항 순서
          example: 1
        options:
          type: array
          description: 객관식 보기(OX는 빈 목록)
          items:
            $ref: "#/components/schemas/OptionView"
    QuizResponse:
      type: object
      properties:
        quizId:
          type: integer
          format: int64
          description: 퀴즈 ID
          example: 1
        type:
          type: string
          description: 퀴즈 종류
          enum:
          - FIRST_MEET
          - REMIND
        active:
          type: boolean
          description: 활성 여부
          example: true
        questions:
          type: array
          description: 문항 목록(정답 포함)
          items:
            $ref: "#/components/schemas/QuestionView"
    ProfileRequest:
      type: object
      properties:
        school:
          type: string
          description: 학교명
          example: 국민대학교
          maxLength: 30
          minLength: 0
        gender:
          type: string
          description: 성별
          enum:
          - MALE
          - FEMALE
          example: MALE
        mbti:
          type: string
          description: MBTI(영문 4자)
          example: ENFP
          minLength: 1
          pattern: "^[A-Za-z]{4}$"
        drinkLevel:
          type: string
          description: 주량
          example: 소주 3잔
          maxLength: 20
          minLength: 0
        favoriteFood:
          type: string
          description: 좋아하는 음식
          example: 치킨
          maxLength: 30
          minLength: 0
      required:
      - drinkLevel
      - gender
      - mbti
      - school
    ApiResponseProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: "#/components/schemas/ProfileResponse"
          description: 성공 시 응답 데이터 (실패 시 null)
        error:
          $ref: "#/components/schemas/ErrorDetail"
