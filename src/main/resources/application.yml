spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: qnectdk
  datasource:
    # Use environment variables when available, otherwise fall back to sensible local defaults
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/qnectdk?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:true}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.example.qnectdk: DEBUG

# SpringDoc (OpenAPI) defaults
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Optional: set active profile via environment (SPRING_PROFILES_ACTIVE) or JVM arg
# e.g. -Dspring.profiles.active=dev or set SPRING_PROFILES_ACTIVE=dev in environment



