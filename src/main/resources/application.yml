spring:
  config:
    import: optional:file:./.env[.properties]

  application:
    name: qnectdb

  datasource:
    url: jdbc:mysql://localhost:3306/qnectdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

logging:
  level:
    root: INFO
    com.qnectdk: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# 애플리케이션 커스텀 설정 (A 소유). 값은 .env로 주입, 없으면 아래 fallback 사용.
app:
  jwt:
    # HS 서명용 시크릿. 커밋된 기본값을 두지 않는다(노출 시 토큰 위조 가능).
    # 반드시 환경변수/.env의 JWT_SECRET으로 주입. 미설정 시 기동 실패(fail-fast). 최소 32바이트.
    secret: ${JWT_SECRET}
    access-token-validity-ms: ${JWT_ACCESS_VALIDITY_MS:3600000}        # 1시간
    refresh-token-validity-ms: ${JWT_REFRESH_VALIDITY_MS:1209600000}   # 14일
  storage:
    # 프로필 이미지 저장소. S3 설정 전까지 로컬 파일 저장으로 대체.
    local:
      base-path: ${STORAGE_LOCAL_PATH:./uploads}
      base-url: ${STORAGE_BASE_URL:http://localhost:8080/files}
  share:
    # QR/공유 URL 생성용 base. 예: https://{base}/{publicCode}
    base-url: ${SHARE_BASE_URL:https://qnect.app}
  gemini:
    # AI 퀴즈 생성. 기본은 비활성(Mock 생성기 사용) — 키 없이도 동작한다.
    # 실제 Gemini 사용 시 enabled=true + GEMINI_API_KEY(서버 env)만 설정. 키는 절대 커밋/클라이언트 노출 금지.
    enabled: ${GEMINI_ENABLED:false}
    api-key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    model: ${GEMINI_MODEL:gemini-3.1-flash-lite}
    connect-timeout-ms: ${GEMINI_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${GEMINI_READ_TIMEOUT_MS:20000}
    max-retries: ${GEMINI_MAX_RETRIES:2}
